<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nyros Intelligence — Organization Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: dark;
    --bg-0:#0F172A;
    --bg-1:#111827;
    --bg-2:#1F2937;
    --bg-2-hover:#26313F;
    --line:rgba(148,163,184,.12);
    --line-soft:rgba(148,163,184,.07);
    --blue:#3B82F6;
    --cyan:#06B6D4;
    --green:#10B981;
    --text-hi:#F8FAFC;
    --text-md:#CBD5E1;
    --text-lo:#8695A8;
    --font-display:'Space Grotesk', ui-sans-serif, sans-serif;
    --font-body:'Inter', ui-sans-serif, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow-1: 0 1px 0 rgba(255,255,255,.03) inset, 0 10px 30px -12px rgba(0,0,0,.55);
    --shadow-glow: 0 0 0 1px rgba(59,130,246,.25), 0 0 40px -8px rgba(59,130,246,.35);
  }
  *{box-sizing:border-box;}
  ::selection{ background: rgba(59,130,246,.35); }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: var(--font-body);
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(6,182,212,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(59,130,246,.10), transparent 55%),
      var(--bg-1);
    color: var(--text-hi);
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  .app{ display:grid; grid-template-columns: 272px minmax(0,1fr); min-height:100vh; }

  /* ---------------- Sidebar ---------------- */
  aside{
    background: linear-gradient(180deg, var(--bg-0), #0B1220);
    border-right: 1px solid var(--line);
    padding: 18px 14px 14px;
    display:flex; flex-direction:column; gap:16px;
    position: sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{ display:flex; align-items:center; gap:10px; padding: 4px 6px 8px; }
  .brand-mark{ width:32px; height:32px; border-radius:9px; position:relative; flex:none;
    background: conic-gradient(from 220deg, var(--blue), var(--cyan) 45%, var(--green) 100%);
    box-shadow: var(--shadow-glow);
  }
  .brand-mark::after{
    content:""; position:absolute; inset:6px; border-radius:6px; background: var(--bg-0);
    clip-path: polygon(50% 8%, 92% 92%, 50% 68%, 8% 92%);
  }
  .brand-name{ font-family: var(--font-display); font-weight:700; font-size:15px; letter-spacing:-.01em; }
  .brand-sub{ font-size:11px; color: var(--text-lo); margin-top:1px; font-family: var(--font-mono); letter-spacing:.02em; }

  .new-chat{
    appearance:none; width:100%; display:flex; align-items:center; gap:9px;
    color: var(--text-hi); border:1px solid var(--line); border-radius: var(--radius-md);
    background: var(--bg-2); padding: 11px 13px; font: 600 13px/1 var(--font-body); cursor:pointer;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .new-chat:hover{ background: var(--bg-2-hover); border-color: rgba(59,130,246,.4); }
  .new-chat:active{ transform: scale(.98); }

  .search-box{
    display:flex; align-items:center; gap:8px; padding:9px 11px; border-radius: var(--radius-md);
    background: rgba(255,255,255,.03); border:1px solid var(--line-soft); color: var(--text-lo);
  }
  .search-box input{ border:0; outline:0; background:transparent; color:var(--text-hi); font:13px var(--font-body); width:100%; }
  .search-box input::placeholder{ color: var(--text-lo); }

  .side-title{ font-size:10.5px; font-weight:700; color: var(--text-lo); margin: 10px 8px 2px; text-transform:uppercase; letter-spacing:.09em; display:flex; align-items:center; justify-content:space-between; }
  .side-scroll{ display:grid; gap:2px; max-height: 24vh; overflow-y:auto; }
  .history-item{
    width:100%; border:0; border-radius: var(--radius-sm); background:transparent; color: var(--text-md);
    cursor:pointer; padding: 8px 10px; text-align:left; font:13px/1.35 var(--font-body);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:8px;
    transition: background .12s ease, color .12s ease;
  }
  .history-item .dot{ width:5px; height:5px; border-radius:50%; background: var(--text-lo); flex:none; }
  .history-item:hover{ background: var(--bg-2); color:#fff; }
  .history-item.active{ background: var(--bg-2); color:#fff; }
  .history-item.active .dot{ background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .history-item.pinned .dot{ background: var(--green); }

  .sidebar-foot{ margin-top:auto; padding-top:10px; border-top:1px solid var(--line-soft); display:grid; gap:2px; }
  .foot-item{ display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius: var(--radius-sm); color: var(--text-md); font-size:13px; cursor:pointer; }
  .foot-item:hover{ background: var(--bg-2); color:#fff; }
  .profile{ display:flex; align-items:center; gap:10px; padding:8px; }
  .profile-avatar{ width:28px; height:28px; border-radius:50%; background: linear-gradient(135deg, var(--blue), var(--green)); flex:none; display:grid; place-items:center; font-size:11px; font-weight:700; }
  .profile-name{ font-size:12.5px; font-weight:600; }
  .profile-role{ font-size:10.5px; color: var(--text-lo); }

  .icon{ width:15px; height:15px; flex:none; opacity:.85; }

  /* ---------------- Main ---------------- */
  main{ min-width:0; display:flex; flex-direction:column; min-height:100vh; }

  .topbar{
    height:60px; display:flex; align-items:center; gap:14px; padding: 0 22px;
    border-bottom: 1px solid var(--line-soft); backdrop-filter: blur(10px);
    background: rgba(17,24,39,.75); position: sticky; top:0; z-index:5;
  }
  .menu-toggle{ display:none; background:transparent; border:1px solid var(--line); color:var(--text-md); border-radius:8px; width:32px; height:32px; cursor:pointer; }
  .topbar-title{ font-family: var(--font-display); font-weight:600; font-size:14.5px; letter-spacing:-.01em; }
  .topbar-search{
    flex:1; max-width:420px; display:flex; align-items:center; gap:8px; padding: 8px 12px;
    background: rgba(255,255,255,.03); border:1px solid var(--line-soft); border-radius: 999px; color: var(--text-lo);
  }
  .topbar-search input{ border:0; outline:0; background:transparent; color:var(--text-hi); font:13px var(--font-body); width:100%; }
  .model-pill{
    margin-left:auto; display:flex; align-items:center; gap:7px; padding:7px 12px 7px 10px; border-radius:999px;
    background: rgba(59,130,246,.10); border:1px solid rgba(59,130,246,.28); color:#DCE9FF; font-size:12.5px; font-weight:600;
  }
  .model-pill select{ background:transparent; border:0; color:inherit; font: inherit; cursor:pointer; outline:0; }
  .model-pill .live-dot{ width:6px; height:6px; border-radius:50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .icon-btn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background: var(--bg-2); color: var(--text-md); display:grid; place-items:center; cursor:pointer; position:relative; flex:none; }
  .icon-btn:hover{ background: var(--bg-2-hover); color:#fff; }
  .icon-btn .badge{ position:absolute; top:-3px; right:-3px; width:8px; height:8px; border-radius:50%; background: var(--cyan); border:2px solid var(--bg-1); }
  .avatar-btn{ width:34px; height:34px; border-radius:50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); display:grid; place-items:center; font-size:12px; font-weight:700; cursor:pointer; border:0; color:#fff; }

  #chat{ width:min(880px, calc(100% - 40px)); margin:0 auto; padding: 40px 0 190px; flex:1; }

  /* ---------------- Welcome / empty state ---------------- */
  .welcome{ text-align:center; padding: 6vh 0 10px; animation: rise .5s ease both; }
  .welcome-mark{ width:56px; height:56px; margin:0 auto 22px; border-radius:16px; position:relative;
    background: conic-gradient(from 220deg, var(--blue), var(--cyan) 45%, var(--green) 100%); box-shadow: var(--shadow-glow); }
  .welcome-mark::after{ content:""; position:absolute; inset:10px; border-radius:9px; background: var(--bg-0);
    clip-path: polygon(50% 8%, 92% 92%, 50% 68%, 8% 92%); }
  .welcome h1{ font-family: var(--font-display); font-size: clamp(26px, 3.6vw, 36px); margin:0 0 10px; letter-spacing:-.03em; font-weight:700; }
  .welcome p{ margin:0 0 34px; color: var(--text-lo); font-size:14.5px; }

  .cards-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .use-card{
    text-align:left; border:1px solid var(--line); background: var(--bg-2); border-radius: var(--radius-lg);
    padding:16px; cursor:pointer; transition: transform .15s ease, border-color .15s ease, background .15s ease; position:relative; overflow:hidden;
  }
  .use-card::before{ content:""; position:absolute; inset:0; opacity:0; transition:opacity .2s ease;
    background: radial-gradient(160px 90px at 15% 0%, rgba(59,130,246,.16), transparent 70%); }
  .use-card:hover{ transform: translateY(-3px); border-color: rgba(59,130,246,.35); }
  .use-card:hover::before{ opacity:1; }
  .use-icon{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; font-size:16px; margin-bottom:12px; }
  .use-title{ font-weight:650; font-size:13.5px; margin-bottom:8px; font-family: var(--font-display); letter-spacing:-.01em; }
  .use-list{ display:grid; gap:5px; }
  .use-q{ font-size:12px; color: var(--text-lo); line-height:1.5; padding-left:12px; position:relative; }
  .use-q::before{ content:"›"; position:absolute; left:0; color: var(--blue); font-weight:700; }
  .use-q:hover{ color: var(--text-md); }

  @media (max-width: 900px){ .cards-grid{ grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 620px){ .cards-grid{ grid-template-columns: 1fr; } }

  /* ---------------- Messages ---------------- */
  .message{ display:grid; grid-template-columns: 32px 1fr; gap:14px; margin: 0 0 26px; animation: rise .35s ease both; }
  .message.user{ grid-template-columns: 1fr 32px; }
  .message.user .avatar{ order:2; }
  .message.user .bubble-col{ order:1; display:flex; flex-direction:column; align-items:flex-end; }
  .avatar{ width:32px; height:32px; border-radius:10px; display:grid; place-items:center; font-size:11.5px; font-weight:700; flex:none; }
  .avatar.ai{ background: conic-gradient(from 220deg, var(--blue), var(--cyan) 45%, var(--green) 100%); color:#0B1220; }
  .avatar.me{ background: var(--bg-2); border:1px solid var(--line); color: var(--text-md); }

  .bubble{ line-height:1.65; font-size:14.5px; color: var(--text-hi); }
  .message.user .bubble{
    background: linear-gradient(135deg, rgba(59,130,246,.16), rgba(6,182,212,.10));
    border:1px solid rgba(59,130,246,.25); padding: 11px 15px; border-radius: 16px 16px 4px 16px; max-width: 80%;
  }
  .message.assistant .bubble{ padding-top:2px; white-space: pre-wrap; overflow-wrap:anywhere; }

  .meta-row{ display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft); }
  .meta-item{ display:flex; align-items:center; gap:6px; font-size:11px; color: var(--text-lo); font-family: var(--font-mono); }
  .meta-item b{ color: var(--text-md); font-weight:600; }
  .gauge{ width:22px; height:22px; flex:none; }

  .msg-actions{ display:flex; gap:4px; margin-top:10px; }
  .msg-actions button{
    width:28px; height:28px; border-radius:7px; border:1px solid transparent; background:transparent;
    color: var(--text-lo); cursor:pointer; display:grid; place-items:center;
  }
  .msg-actions button:hover{ background: var(--bg-2); border-color: var(--line); color:#fff; }
  .msg-actions button.on{ color: var(--blue); }

  .typing{ display:inline-flex; gap:4px; align-items:center; padding: 4px 0; }
  .typing i{ width:6px; height:6px; border-radius:50%; background: var(--text-lo); animation: bounce 1.1s infinite ease-in-out; }
  .typing i:nth-child(2){ animation-delay:.15s; } .typing i:nth-child(3){ animation-delay:.3s; }

  @keyframes bounce{ 0%,60%,100%{ transform: translateY(0); opacity:.5; } 30%{ transform: translateY(-4px); opacity:1; } }
  @keyframes rise{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform:none; } }

  /* ---------------- Composer ---------------- */
  .composer-wrap{ position:fixed; bottom:0; left:272px; right:0; padding: 16px 18px 22px;
    background: linear-gradient(transparent, var(--bg-1) 30%); z-index:4; }
  .composer{
    width:min(880px, 100%); margin:0 auto; display:flex; align-items:end; gap:8px;
    background: var(--bg-2); border:1px solid var(--line); border-radius: 20px; padding: 10px 10px 10px 16px;
    box-shadow: var(--shadow-1); transition: border-color .15s ease, box-shadow .15s ease;
  }
  .composer:focus-within{ border-color: rgba(59,130,246,.5); box-shadow: var(--shadow-glow); }
  textarea{ flex:1; min-height:24px; max-height:160px; border:0; outline:0; resize:none; background:transparent; color: var(--text-hi); font:14.5px/1.5 var(--font-body); padding:6px 0; }
  textarea::placeholder{ color: var(--text-lo); }
  .send{ width:34px; height:34px; border:0; border-radius:50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); color:#fff; font-weight:bold; cursor:pointer; display:grid; place-items:center; flex:none; transition: transform .1s ease, opacity .15s ease; }
  .send:disabled{ opacity:.35; cursor:default; }
  .send:not(:disabled):active{ transform: scale(.92); }
  .hint{ width:min(880px, 100%); margin: 9px auto 0; text-align:center; color: var(--text-lo); font-size:11px; font-family: var(--font-mono); }

  /* ---------------- Floating quick actions ---------------- */
  .fab-stack{ position:fixed; right:22px; bottom: 118px; display:flex; flex-direction:column; align-items:flex-end; gap:9px; z-index:6; }
  .fab-item{
    display:flex; align-items:center; gap:9px; background: var(--bg-2); border:1px solid var(--line); color: var(--text-md);
    padding:9px 9px 9px 13px; border-radius:999px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap;
    box-shadow: var(--shadow-1); opacity:0; transform: translateY(6px) scale(.96); pointer-events:none;
    transition: opacity .16s ease, transform .16s ease, background .15s ease, border-color .15s ease;
  }
  .fab-stack.open .fab-item{ opacity:1; transform:none; pointer-events:auto; }
  .fab-item:hover{ background: var(--bg-2-hover); border-color: rgba(59,130,246,.4); color:#fff; }
  .fab-item .dot{ width:26px; height:26px; border-radius:50%; display:grid; place-items:center; flex:none; }
  .fab-main{
    width:50px; height:50px; border-radius:50%; border:0; cursor:pointer; color:#fff;
    background: linear-gradient(135deg, var(--blue), var(--green)); box-shadow: var(--shadow-glow);
    display:grid; place-items:center; transition: transform .2s ease;
  }
  .fab-stack.open .fab-main{ transform: rotate(45deg); }

  /* ---------------- Scrollbars ---------------- */
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background: rgba(148,163,184,.18); border-radius:99px; }
  ::-webkit-scrollbar-thumb:hover{ background: rgba(148,163,184,.3); }

  @media (max-width: 760px){
    .app{ grid-template-columns: 1fr; }
    aside{ position:fixed; inset:0 auto 0 0; width:270px; transform: translateX(-100%); transition: transform .2s ease; z-index:20; }
    aside.open{ transform:none; }
    .composer-wrap{ left:0; }
    .menu-toggle{ display:grid; place-items:center; }
    .topbar-search{ display:none; }
    #chat{ padding-top:24px; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">AutoIntel 360</div>
          <div class="brand-sub">ORG-WIDE AUTOMOTIVE AI</div>
        </div>
      </div>

      <button class="new-chat" id="new-chat">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div class="search-box">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search-conversations" placeholder="Search conversations" />
      </div>

      <div>
        <div class="side-title">Pinned</div>
        <div class="side-scroll" id="pinned" style="max-height:none;"></div>
      </div>

      <div>
        <div class="side-title">Recent</div>
        <div class="side-scroll" id="history"></div>
      </div>

      <div class="sidebar-foot">
        <div class="foot-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.04H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z"/></svg> Settings</div>
        <div class="profile">
          <div class="profile-avatar">NY</div>
          <div>
            <div class="profile-name"></div>
            <div class="profile-role">Org Admin</div>
          </div>
        </div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <button class="menu-toggle" id="menu-toggle">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <div class="topbar-title">Organization Intelligence</div>
        <div class="topbar-search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input placeholder="Search anything…" />
        </div>
        <div class="model-pill">
          <span class="live-dot"></span>
          <select id="model-select">
            <option>Nyros Intel 1</option>
            <option>Nyros Tech</option>
            <option>Nyros Future</option>
          </select>
        </div>
        <button class="icon-btn" aria-label="Notifications"><span class="badge"></span>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
        <button class="avatar-btn" aria-label="Profile">Ny</button>
      </div>

      <div id="chat"></div>

      <div class="fab-stack" id="fab-stack">
        <button class="fab-item" data-prompt="Start a new analysis on the latest customer data.">
          <span class="dot" style="background:rgba(59,130,246,.18); color:#93C5FD;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </span> New Analysis
        </button>
        <button class="fab-item" data-prompt="Predict this customer's likelihood to purchase or churn.">
          <span class="dot" style="background:rgba(16,185,129,.18); color:#6EE7B7;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/></svg>
          </span> Predict Customer
        </button>
        <button class="fab-item" data-prompt="I want to upload a new dataset for analysis.">
          <span class="dot" style="background:rgba(6,182,212,.18); color:#67E8F9;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>
          </span> Upload Dataset
        </button>
        <button class="fab-item" data-prompt="Export the results of this conversation as a report.">
          <span class="dot" style="background:rgba(59,130,246,.18); color:#93C5FD;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12M6 10l6 6 6-6"/><path d="M4 20h16"/></svg>
          </span> Export Results
        </button>
        <button class="fab-item" data-prompt="Show me the executive analytics dashboard summary.">
          <span class="dot" style="background:rgba(16,185,129,.18); color:#6EE7B7;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M11 19V4M18 19v-6"/></svg>
          </span> Analytics Dashboard
        </button>
        <button class="fab-main" id="fab-main" aria-label="Quick actions">
          <svg class="icon" style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="question" rows="1" placeholder="Ask about your organization…"></textarea>
          <button class="send" id="ask" aria-label="Send message">
            <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
          </button>
        </div>
        <div class="hint">Responses are generated through the configured LLM API key · Verify critical figures before acting</div>
      </div>
    </main>
  </div>

<script>
  const chatEl = document.getElementById('chat');
  const question = document.getElementById('question');
  const ask = document.getElementById('ask');
  const sidebar = document.getElementById('sidebar');
  const storageKey = 'organization-intelligence-chats';
  const apiBase = 'https://customer-intelligence-api-3wig.onrender.com';
  let chats = JSON.parse(localStorage.getItem(storageKey) || '[]');
  let activeChatId = null;

  const USE_CASES = [
    { icon:'🚗', color:'rgba(59,130,246,.16)', title:'Purchase Intelligence',
      q:['Which customers are likely to buy next?','Predict next vehicle purchase.','Top 20 high purchase intent customers.','Customers ready for upgrade.'] },
    { icon:'🔁', color:'rgba(6,182,212,.16)', title:'Customer Retention',
      q:['Customers likely to churn.','Customers overdue for service.','High-risk customers.','Customers needing follow-up.'] },
    { icon:'📈', color:'rgba(16,185,129,.16)', title:'Marketing Intelligence',
      q:['Best customers for email campaigns.','Customers with high engagement.','Top marketing opportunities.','Campaign performance insights.'] },
    { icon:'💰', color:'rgba(59,130,246,.16)', title:'Financial Intelligence',
      q:['Highest lifetime value customers.','Customers with finance opportunities.','High-value customer segments.','Revenue predictions.'] },
    { icon:'📊', color:'rgba(6,182,212,.16)', title:'Executive Analytics',
      q:['Organization performance summary.','Monthly business insights.','Customer trends.','Sales performance.'] },
  ];

  function saveChats(){ localStorage.setItem(storageKey, JSON.stringify(chats)); }
  function activeChat(){ return chats.find(c => c.id === activeChatId); }

  function newChat(){
    const c = { id: crypto.randomUUID(), title:'New organization chat', messages:[], pinned:false };
    chats.unshift(c); activeChatId = c.id; saveChats(); renderHistory(); renderChat();
  }

  function renderHistory(filter){
    const historyBox = document.getElementById('history');
    const pinnedBox = document.getElementById('pinned');
    historyBox.innerHTML = ''; pinnedBox.innerHTML = '';
    const term = (filter || '').toLowerCase();
    chats.filter(c => !term || c.title.toLowerCase().includes(term)).forEach(c => {
      const btn = document.createElement('button');
      btn.className = `history-item${c.pinned ? ' pinned' : ''}${c.id === activeChatId ? ' active' : ''}`;
      btn.innerHTML = `<span class="dot"></span><span></span>`;
      btn.querySelector('span:last-child').textContent = c.title;
      btn.onclick = () => { activeChatId = c.id; renderHistory(document.getElementById('search-conversations').value); renderChat(); closeMobileSidebar(); };
      (c.pinned ? pinnedBox : historyBox).appendChild(btn);
    });
    if(!pinnedBox.children.length){ pinnedBox.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:var(--text-lo);">No pinned chats yet</div>'; }
  }

  function renderChat(){
    const current = activeChat();
    chatEl.innerHTML = '';
    if(!current || !current.messages.length){
      chatEl.innerHTML = `
        <div class="welcome">
          <div class="welcome-mark"></div>
          <h1>How can I help your organization today?</h1>
          <p>Choose an intelligence model and ask about your customers, sales, or service performance.</p>
          <div class="cards-grid" id="cards-grid"></div>
        </div>`;
      const grid = document.getElementById('cards-grid');
      USE_CASES.forEach(uc => {
        const card = document.createElement('div');
        card.className = 'use-card';
        card.innerHTML = `
          <div class="use-icon" style="background:${uc.color}">${uc.icon}</div>
          <div class="use-title">${uc.title}</div>
          <div class="use-list">${uc.q.map(q => `<div class="use-q">${q}</div>`).join('')}</div>`;
        card.querySelectorAll('.use-q').forEach((el, i) => {
          el.onclick = () => { question.value = uc.q[i]; autoGrow(); send(); };
        });
        grid.appendChild(card);
      });
    } else {
      current.messages.forEach(m => renderMessage(m, false));
    }
  }

  function gaugeSVG(pct){
    const r = 8, c = 2*Math.PI*r, off = c - (pct/100)*c;
    const color = pct >= 85 ? 'var(--green)' : pct >= 65 ? 'var(--cyan)' : 'var(--blue)';
    return `<svg class="gauge" viewBox="0 0 22 22"><circle cx="11" cy="11" r="${r}" fill="none" stroke="rgba(148,163,184,.18)" stroke-width="3"/>
      <circle cx="11" cy="11" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 11 11)"/></svg>`;
  }

  function renderMessage(m, persist){
    document.querySelector('.welcome')?.remove();
    const wrap = document.createElement('div');
    wrap.className = `message ${m.role}`;
    if(m.role === 'user'){
      wrap.innerHTML = `<div class="avatar me">You</div>
        <div class="bubble-col"><div class="bubble"></div></div>`;
      wrap.querySelector('.bubble').textContent = m.text;
    } else {
      wrap.innerHTML = `<div class="avatar ai">AI</div>
        <div class="bubble-col" style="width:100%;">
          <div class="bubble"></div>
          <div class="meta-row" style="display:${m.pending ? 'none' : 'flex'};">
            ${gaugeSVG(m.confidence || 92)}
            <div class="meta-item">Confidence <b>${m.confidence || 92}%</b></div>
            <div class="meta-item">⏱ <b>${m.timeTaken || '1.2s'}</b></div>
            <div class="meta-item">◈ <b>${m.source || 'Org Data Warehouse'}</b></div>
            <div class="meta-item">◆ <b>${m.model || 'Nyros intel 1'}</b></div>
            <div class="meta-item">${m.timestamp || ''}</div>
          </div>
          <div class="msg-actions" style="display:${m.pending ? 'none' : 'flex'};">
            <button title="Copy" data-act="copy"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button title="Regenerate" data-act="regen"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15"/></svg></button>
            <button title="Like" data-act="like"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg></button>
            <button title="Dislike" data-act="dislike"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg></button>
            <button title="Share" data-act="share"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg></button>
            <button title="Download PDF" data-act="pdf"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M6 10l6 6 6-6"/><path d="M4 20h16"/></svg></button>
          </div>
        </div>`;
      const bubble = wrap.querySelector('.bubble');
      if(m.pending){
        bubble.innerHTML = `<span class="typing"><i></i><i></i><i></i></span>`;
      } else {
        bubble.textContent = m.text;
      }
      wrap.querySelectorAll('.msg-actions button').forEach(btn => {
        btn.onclick = () => {
          const act = btn.dataset.act;
          if(act === 'copy'){ navigator.clipboard?.writeText(m.text || ''); }
          if(act === 'like'){ btn.classList.toggle('on'); }
          if(act === 'dislike'){ btn.classList.toggle('on'); }
          if(act === 'regen'){ question.value = (activeChat().messages.find(x => x.role==='user') || {}).text || ''; }
        };
      });
    }
    chatEl.appendChild(wrap);
    window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
    return wrap;
  }

  function nowStamp(){
    return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  async function send(){
    const text = question.value.trim();
    if(!text || ask.disabled) return;
    if(!activeChatId) newChat();
    const current = activeChat();

    const history = current.messages.slice(-8).map(m => ({
      role: m.role === 'assistant' ? 'assistant' : 'user',
      content: m.text
    }));

    const userMsg = { role:'user', text };
    current.messages.push(userMsg);
    if(current.messages.length === 1) current.title = text.slice(0, 38);
    saveChats(); renderHistory(); renderMessage(userMsg, true);

    question.value = ''; question.style.height = 'auto'; ask.disabled = true;

    const pendingMsg = { role:'assistant', text:'', pending:true };
    const pendingEl = renderMessage(pendingMsg, false);
    const started = performance.now();

    try{
      let response;
      for(let attempt = 0; attempt < 2; attempt++){
        try{
          response = await fetch(apiBase + '/chat', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ question:text, history })
          });
          break;
        }catch(err){
          if(attempt === 1) throw err;

          await new Promise(r => setTimeout(r, 1200));
        }
      }
      const data = await response.json();
      if(!response.ok) throw new Error(data.detail || 'Unable to answer the question.');
      const elapsed = ((performance.now() - started) / 1000).toFixed(1) + 's';
      const finalMsg = {
        role:'assistant', text: data.answer, pending:false,
        confidence: data.confidence || Math.round(82 + Math.random()*15),
        timeTaken: data.timeTaken || elapsed,
        source: data.source || 'Org Data Warehouse',
        model: document.getElementById('model-select').value,
        timestamp: nowStamp()
      };
      current.messages[current.messages.length - 1] = finalMsg;
      saveChats();
      pendingEl.replaceWith(renderMessage(finalMsg, false));
    }catch(err){
      const failMsg = {
        role:'assistant', pending:false,
        text: err.message || 'The LLM service is unavailable. Please wait a moment and try again.',
        confidence: 0, timeTaken: '—', source: '—', model: document.getElementById('model-select').value, timestamp: nowStamp()
      };
      current.messages[current.messages.length - 1] = failMsg;
      saveChats();
      pendingEl.replaceWith(renderMessage(failMsg, false));
    } finally {
      ask.disabled = false; question.focus();
    }
  }

  function autoGrow(){ question.style.height = 'auto'; question.style.height = Math.min(question.scrollHeight, 160) + 'px'; }

  function closeMobileSidebar(){ if(window.innerWidth <= 760) sidebar.classList.remove('open'); }

  document.getElementById('new-chat').onclick = () => { newChat(); question.focus(); closeMobileSidebar(); };
  document.getElementById('menu-toggle').onclick = () => sidebar.classList.toggle('open');
  document.getElementById('search-conversations').oninput = e => renderHistory(e.target.value);
  ask.onclick = send;
  question.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } };
  question.oninput = autoGrow;

  const fabStack = document.getElementById('fab-stack');
  document.getElementById('fab-main').onclick = () => fabStack.classList.toggle('open');
  fabStack.querySelectorAll('.fab-item').forEach(btn => {
    btn.onclick = () => { question.value = btn.dataset.prompt; autoGrow(); fabStack.classList.remove('open'); question.focus(); };
  });

  if(chats.length){ activeChatId = chats[0].id; } else { newChat(); }
  renderHistory(); renderChat();
</script>
</body>
</html>
